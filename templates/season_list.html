{% extends "base.html" %}
{% block title %}Seasons — VolleyStats{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Seasons</h1>
  <a href="{{ url_for('index') }}" class="btn btn-outline">← Games</a>
</div>
{% if seasons %}
<div class="season-cards">
  {% for s in seasons %}
  <a class="season-card" href="{{ url_for('season_report', season=s) }}">
    <span class="season-tag lg">{{ s }}</span>
    <span class="season-card-arrow">→</span>
  </a>
  {% endfor %}
</div>
{% else %}
<p class="empty">No seasons yet. Add a season label when creating a game.</p>
{% endif %}
{% endblock %}
