<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}VolleyStats{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script>
    if (window.Chart && window.ChartDataLabels) {
      Chart.register(ChartDataLabels);
      Chart.defaults.plugins.datalabels.display = false;
    }
  </script>
  <script>
    function initFilterToggle(key) {
      var wrap = document.getElementById('filter-rows');
      var btn  = document.getElementById('filter-toggle-btn');
      if (!wrap || !btn) return;
      if (localStorage.getItem(key) === '1') {
        wrap.classList.add('filters-hidden');
        btn.classList.add('is-collapsed');
      }
      btn.addEventListener('click', function () {
        var nowHidden = wrap.classList.toggle('filters-hidden');
        btn.classList.toggle('is-collapsed', nowHidden);
        localStorage.setItem(key, nowHidden ? '1' : '0');
      });
    }
  </script>
</head>
<body>
  <header>
    <a class="logo" href="{{ url_for('index') }}">🏐 VolleyStats</a>
    <nav class="main-nav">
      {% if current_user.is_authenticated %}
      <a href="{{ url_for('team_list') }}">Teams</a>
      <a href="{{ url_for('index') }}">Games</a>
      <a href="{{ url_for('player_report') }}">Players</a>
      <a href="{{ url_for('season_list') }}">Seasons</a>
      {% if current_user.role == 'admin' %}<a href="{{ url_for('admin_users') }}">Admin</a>{% endif %}
      <span class="nav-user">{{ current_user.email }} <span class="role-badge role-{{ current_user.role }}">{{ current_user.role }}</span></span>
      <form method="post" action="{{ url_for('logout') }}" style="display:inline">
        <button type="submit" class="btn btn-sm btn-outline">Log out</button>
      </form>
      {% else %}
      <a href="{{ url_for('login') }}">Log in</a>
      <a href="{{ url_for('register') }}" class="btn btn-sm btn-primary">Register</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
