{% extends "base.html" %}
{% from "_macros.html" import player_roster_section %}
{% block title %}Nieuwe wedstrijd — VolleyStats{% endblock %}
{% block content %}
<h1>Nieuwe wedstrijd</h1>
<form method="POST" id="setup-form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <section class="card">
    <h2>Wedstrijdinfo</h2>
    <div class="field-row">
      <label>Seizoen
        <select name="season" id="season-select">
          <option value="">— Selecteer seizoen —</option>
          {% for s in seasons %}<option value="{{ s }}">{{ s }}</option>{% endfor %}
        </select>
      </label>
      <label>Uw team
        <select id="team-select">
          <option value="" data-id="">— Selecteer team —</option>
          {% for t in club_teams %}
          <option value="{{ t.name }}" data-id="{{ t.id }}">{{ t.short_name or t.name }}</option>
          {% endfor %}
          <option value="__new__" data-id="">️️️ Team toevoegen…</option>
        </select>
        <input type="hidden" name="team_name" id="team-value" value="" />
        <input type="hidden" name="club_team_id" id="club-team-id-value" value="" />
        <div id="new-team-inline" style="display:none;margin-top:0.5rem">
          <div style="display:flex;gap:0.4rem;align-items:center">
            <input type="text" id="new-team-input" placeholder="bijv. Spikemasters" style="flex:1" />
            <button type="button" class="btn btn-sm btn-primary" id="add-team-btn">Toevoegen</button>
            <button type="button" class="btn btn-sm btn-outline" id="cancel-team-btn">✕</button>
          </div>
          <small id="team-error" style="color:var(--red);display:none">Teamnaam mag niet leeg zijn</small>
        </div>
      </label>
      <label>Tegenstander
        <input type="text" name="opponent" required placeholder="bijv. Blockers FC" />
      </label>
      <label>Datum
        <input type="date" name="played_at" value="{{ today }}" />
      </label>
    </div>
  </section>

  {{ player_roster_section([], all_profiles, title='Uw spelers') }}

  <div class="form-actions">
    <button type="submit" class="btn btn-primary btn-lg">Bijhouden starten →</button>
  </div>
</form>

<script src="{{ url_for('static', filename='js/player-picker.js') }}"></script>
<script>
  const seasonIdMap = {{ season_id_map | tojson }};
  initPlayerPicker({{ all_profiles | tojson }}, { showClear: true, clearMsg: 'Alle spelers van de lijst verwijderen?', noDupCheck: true });

  const today = new Date().toISOString().slice(0, 10);
  const dateInput = document.querySelector('input[name="played_at"]');
  if (!dateInput.value) dateInput.value = today;

  document.getElementById('setup-form').addEventListener('submit', (e) => {
    if (!document.getElementById('team-value').value.trim()) {
      e.preventDefault();
      document.getElementById('team-select').focus();
      alert('Selecteer of voeg een teamnaam toe.');
      return;
    }
    // Duplicate player check
    const profileSelects = document.querySelectorAll('#players-body select[name="player_profile_id"]');
    const seen = new Set();
    for (const sel of profileSelects) {
      const val = sel.value;
      if (!val) continue;
      if (seen.has(val)) {
        e.preventDefault();
        sel.focus();
        alert('Dubbele speler: "' + sel.options[sel.selectedIndex].text.trim() + '". Elke speler mag maar één keer voorkomen.');
        return;
      }
      seen.add(val);
    }
  });

  // ── Club team selector ───────────────────────────────────────
  const teamSelect      = document.getElementById('team-select');
  const teamValue       = document.getElementById('team-value');
  const newTeamInline   = document.getElementById('new-team-inline');
  const newTeamInput    = document.getElementById('new-team-input');
  const addTeamBtn      = document.getElementById('add-team-btn');
  const cancelTeamBtn   = document.getElementById('cancel-team-btn');
  const teamError       = document.getElementById('team-error');
  const playersBody     = document.getElementById('players-body');

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  teamSelect.addEventListener('change', async () => {
    const selectedOpt = teamSelect.options[teamSelect.selectedIndex];
    const teamId = selectedOpt.dataset.id;
    if (teamSelect.value === '__new__') {
      newTeamInline.style.display = 'block';
      newTeamInput.focus();
      teamValue.value = '';
      document.getElementById('club-team-id-value').value = '';
      return;
    }
    newTeamInline.style.display = 'none';
    teamError.style.display = 'none';
    teamValue.value = teamSelect.value;
    document.getElementById('club-team-id-value').value = teamId || '';
    if (!teamId) return;
    try {
      const seasonName = seasonValue.value;
      const sid = seasonIdMap[seasonName];
      const apiUrl = sid ? `/api/teams/${teamId}/players?season_id=${sid}` : `/api/teams/${teamId}/players`;
      const res = await fetch(apiUrl);
      const players = await res.json();
      if (!players.length) return;
      playersBody.innerHTML = '';
      players.forEach(p => {
        playersBody.appendChild(_makePlayerRow(p.profile_id || null));
      });
      refreshSelects();
    } catch (err) {
      console.error('Failed to fetch team players', err);
    }
  });

  addTeamBtn.addEventListener('click', () => {
    const name = newTeamInput.value.trim();
    if (!name) {
      teamError.style.display = 'block';
      return;
    }
    teamError.style.display = 'none';
    let opt = [...teamSelect.options].find(o => o.value === name);
    if (!opt) {
      opt = new Option(name, name);
      opt.dataset.id = '';
      teamSelect.insertBefore(opt, teamSelect.lastElementChild);
    }
    teamSelect.value = name;
    teamValue.value = name;
    newTeamInline.style.display = 'none';
    newTeamInput.value = '';
  });

  cancelTeamBtn.addEventListener('click', () => {
    newTeamInline.style.display = 'none';
    teamSelect.value = teamValue.value || '';
    newTeamInput.value = '';
    teamError.style.display = 'none';
  });
</script>
{% endblock %}
