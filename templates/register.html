{% extends "base.html" %}
{% block title %}Register — VolleyStats{% endblock %}

{% block content %}
<div class="auth-card">
  <h1 class="auth-title">Create account</h1>

  {% if error %}
  <p class="auth-error">{{ error }}</p>
  {% endif %}

  <form method="post">
    <label>
      Email
      <input type="email" name="email" value="{{ email or '' }}" required autofocus>
    </label>
    <label>
      Password
      <input type="password" name="password" required minlength="8">
    </label>
    <label>
      Confirm password
      <input type="password" name="confirm" required>
    </label>
    <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:.5rem">Create account</button>
  </form>

  <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
</div>
{% endblock %}
