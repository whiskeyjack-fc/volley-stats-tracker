{% extends "base.html" %}
{% block title %}Registreren — VolleyStats{% endblock %}

{% block content %}
<div class="auth-card">
  <h1 class="auth-title">Account aanmaken</h1>

  {% if error %}
  <p class="auth-error">{{ error }}</p>
  {% endif %}

  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>
      E-mailadres
      <input type="email" name="email" value="{{ email or '' }}" required autofocus>
    </label>
    <label>
      Wachtwoord
      <input type="password" name="password" required minlength="8">
    </label>
    <label>
      Wachtwoord bevestigen
      <input type="password" name="confirm" required>
    </label>
    <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:.5rem">Account aanmaken</button>
  </form>

  <p class="auth-switch">Al een account? <a href="{{ url_for('login') }}">Aanmelden</a></p>
</div>
{% endblock %}
